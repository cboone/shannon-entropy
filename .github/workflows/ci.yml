name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lean:
    name: Build, lint, and test (Lean)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: leanprover/lean-action@v1

      - name: Lean lint
        run: lake lint

      - name: Lean test
        run: lake test

  markdown:
    name: Lint (Markdown and spelling)
    uses: cboone/gh-actions/.github/workflows/text-lint.yml@37896a7915c49270272a637ade714f2fea82655f # v2.1.3
    with:
      run-cspell: true
      run-prettier: false

  book:
    name: Build companion book
    runs-on: ubuntu-latest
    needs: lean
    steps:
      - uses: actions/checkout@v5

      - uses: leanprover/lean-action@v1

      - name: Build book sources
        run: lake build Book

      - name: Render book HTML
        run: lake exe generate-book --depth 2 --output _site

      - name: Upload book artifact
        uses: actions/upload-artifact@v4
        with:
          name: companion-book
          path: _site/html-multi

name = "shannon-entropy"
version = "0.1.0"
defaultTargets = ["Shannon"]
lintDriver = "batteries/runLinter"
testDriver = "ShannonTest"

# `-O0` cuts `leanc` compile time for Lean-side builds; the runtime cost is
# irrelevant for a proof library and a one-shot book-rendering executable.
# Matches the `leanprover/reference-manual` package configuration.
moreLeancArgs = ["-O0"]

[leanOptions]
# Pretty-prints `fun a ↦ b`
pp.unicode.fun = true
# Don't assume a typo is a new variable
autoImplicit = false
relaxedAutoImplicit = false
# Enable all mathlib linters: automatically matches what mathlib uses.
weak.linter.mathlibStandardSet = true

[[require]]
name = "batteries"
git = "https://github.com/leanprover-community/batteries"
rev = "756e3321fd3b02a85ffda19fef789916223e578c"  # v4.29.0

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "8a178386ffc0f5fef0b77738bb5449d50efeea95"  # v4.29.0

[[require]]
name = "verso"
git = "https://github.com/leanprover/verso.git"
rev = "v4.29.0"  # verified compatible with Mathlib v4.29.0 via `lake update`

[[lean_lib]]
name = "Shannon"

[[lean_lib]]
name = "Book"

[[lean_lib]]
name = "ShannonTest"
globs = ["ShannonTest.+"]

[[lean_exe]]
name = "generate-book"
root = "Main"
